<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>FORMULÁRIO DE ABERTURA DE VAGA</title>

<style>
body {
  margin: 0;
  padding: 0;
  background: #f2f4f7;
  font-family: Arial, Helvetica, sans-serif;
  text-transform: uppercase;
}

.wrapper {
  max-width: 900px;
  margin: 40px auto;
  background: #ffffff;
  padding: 30px 40px;
  border-radius: 6px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

h1 {
  font-size: 22px;
  margin-bottom: 25px;
  border-bottom: 1px solid #ddd;
  padding-bottom: 10px;
}

.field-group { margin-bottom: 18px; }

.field-row {
  display: flex;
  gap: 15px;
}

.field-row > div { flex: 1; }

label {
  display: block;
  font-size: 13px;
  font-weight: bold;
  margin-bottom: 5px;
}

input, select {
  width: 100%;
  padding: 8px;
  border: 1px solid #ccc;
  border-radius: 4px;
  font-size: 14px;
  text-transform: uppercase;
}

button {
  margin-top: 20px;
  width: 100%;
  padding: 12px;
  background: #005baa;
  color: #fff;
  border: none;
  border-radius: 4px;
  font-size: 16px;
  cursor: pointer;
}

.vaga-box {
  border-top: 2px dashed #ccc;
  margin-top: 30px;
  padding-top: 20px;
}

.logo {
  text-align: center;
  margin-bottom: 20px;
}

.logo img {
  max-width: 260px;
}
</style>
</head>

<body>
<div class="wrapper">

<div class="logo">
  <img src="assets/logoGBF.png">
</div>

<h1>FORMULÁRIO DE ABERTURA DE VAGA</h1>

<form action="https://formsubmit.co/mayara.dantas@grupobrasilforte.com.br" method="POST" enctype="multipart/form-data">

<!-- BLOCO FIXO -->
<div class="field-group">
<label>Nº DO PROTOCOLO</label>
<input type="text" id="protocolo" name="PROTOCOLO" readonly>
</div>

<div class="field-group">
<label>DATA DA ABERTURA</label>
<input type="date" id="dataAbertura" name="DATA_ABERTURA" readonly>
</div>

<div class="field-group">
<label>EMPRESA SOLICITANTE DA VAGA</label>
<select name="EMPRESA" id="empresaSelect" required>
<option value="">SELECIONE</option>
<option>AKVA MONITORAMENTO</option>
<option>AKVA PROTECAO (HEFESTOR)</option>
<option>AKVA TECNOLOGIA</option>
<option>ATRIA SERVICOS</option>
<option>BRASIL FORTE</option>
<option>VEGA SERVICOS</option>
</select>
</div>

<div class="field-group">
<label>SOLICITANTE</label>
<input type="text" name="SOLICITANTE" required>
</div>

<div class="field-group">
<label>E-MAIL</label>
<input type="email" name="EMAIL" required>
</div>

<div id="vagasContainer"></div>

<button type="button" onclick="addVaga()">+ ADICIONAR VAGA</button>
<button type="button" onclick="removeVaga()">- REMOVER ÚLTIMA VAGA</button>

<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_subject" id="assuntoEmail">

<button type="submit">ENVIAR</button>

</form>
</div>

<script>

let vagaCount = 0;

// ===== DATA + PROTOCOLO =====
(function () {
  const hoje = new Date();
  const f = d => d.toISOString().split('T')[0];

  const protocolo = `AV-${f(hoje).replaceAll('-','')}-${Date.now().toString().slice(-4)}`;
  document.getElementById('protocolo').value = protocolo;
  document.getElementById('dataAbertura').value = f(hoje);

  document.getElementById('assuntoEmail').value =
    `FORMULÁRIO DE ABERTURA DE VAGAS - ${protocolo}`;
})();

// ===== ASSUNTO DINÂMICO =====
empresaSelect.addEventListener('change', function () {
  const protocolo = document.getElementById('protocolo').value;
  if (this.value) {
    assuntoEmail.value =
      `FORMULÁRIO DE ABERTURA DE VAGAS - ${this.value} | ${protocolo}`;
  }
});

// ===== DATA +5 DIAS =====
function getDataMinima() {
  const dataAbertura = new Date(document.getElementById('dataAbertura').value);
  dataAbertura.setDate(dataAbertura.getDate() + 5);
  return dataAbertura.toISOString().split('T')[0];
}

// ===== ADICIONAR VAGA =====
function addVaga() {
  vagaCount++;
  const dataMin = getDataMinima();

  const div = document.createElement('div');
  div.className = 'vaga-box';

  div.innerHTML = `
  <h3>VAGA ${String(vagaCount).padStart(2, '0')}</h3>

  <div class="field-group">
    <label>DATA PREVISTA DE INÍCIO</label>
    <input type="date" name="INICIO_${vagaCount}" min="${dataMin}" value="${dataMin}" required>
  </div>

  <div class="field-group">
    <label>POSTO DE TRABALHO</label>
    <input type="text" name="POSTO_${vagaCount}" required>
  </div>

  <div class="field-group">
    <label>CARGO</label>
    <input type="text" name="CARGO_${vagaCount}" required>
  </div>

  <div class="field-group">
    <label>CADASTRAMENTO PRÉVIO EM PORTAL</label>
    <select name="PORTAL_${vagaCount}" required>
      <option value="">SELECIONE</option>
      <option>SIM</option>
      <option>NÃO</option>
    </select>
  </div>

  <div class="field-group">
    <label>TIPO DE CONTRATAÇÃO</label>
    <select name="TIPO_${vagaCount}" onchange="tipoChange(this, ${vagaCount})" required>
      <option value="">SELECIONE</option>
      <option>AUMENTO DE EFETIVO</option>
      <option>COBERTURA DE FERIAS</option>
      <option>INTERMITENTE</option>
      <option>LICENCA MEDICA</option>
      <option>SUBSTITUICAO</option>
    </select>
  </div>

  <div id="extra_${vagaCount}"></div>

  <div class="field-group">
    <label>ANEXAR CURRÍCULO</label>
    <input type="file" name="CURRICULO_${vagaCount}">
  </div>

  <div class="field-group">
    <label>NOME DO CANDIDATO</label>
    <input type="text" name="NOME_CANDIDATO_${vagaCount}">
  </div>

  <div class="field-group">
    <label>TELEFONE</label>
    <input type="text" name="TEL_${vagaCount}">
  </div>

  <div class="field-group">
    <label>WHATSAPP</label>
    <select name="WHATS_${vagaCount}">
      <option value="">SELECIONE</option>
      <option>SIM</option>
      <option>NÃO</option>
    </select>
  </div>
  `;

  document.getElementById('vagasContainer').appendChild(div);
}

// ===== REMOVER VAGA =====
function removeVaga() {
  const container = document.getElementById('vagasContainer');

  if (vagaCount <= 1) {
    alert('PELO MENOS UMA VAGA DEVE EXISTIR');
    return;
  }

  container.removeChild(container.lastElementChild);
  vagaCount--;
}

// ===== DINÂMICA DE TIPO =====
function tipoChange(el, id) {
  const extra = document.getElementById('extra_' + id);
  const dataMin = getDataMinima();

  extra.innerHTML = '';

  if (el.value === 'AUMENTO DE EFETIVO') {
    extra.innerHTML = `
    <div class="field-group">
      <label>QUANTIDADE DE VAGAS</label>
      <input type="number" name="QTD_${id}" min="1" required>
    </div>
    <div class="field-group">
      <label>MOTIVO / JUSTIFICATIVA</label>
      <input type="text" name="MOTIVO_${id}">
    </div>`;
  }

  if (el.value === 'INTERMITENTE') {
    extra.innerHTML = `
    <div class="field-group">
      <label>MOTIVO / JUSTIFICATIVA</label>
      <input type="text" name="MOTIVO_${id}">
    </div>`;
  }

  if (el.value === 'COBERTURA DE FERIAS') {
    extra.innerHTML = `
    <div class="field-group">
      <label>NOME DO COLABORADOR</label>
      <input type="text" name="NOME_${id}">
    </div>
    <div class="field-row field-group">
      <div>
        <label>INÍCIO COBERTURA</label>
        <input type="date" name="INI_${id}" min="${dataMin}" value="${dataMin}" required>
      </div>
      <div>
        <label>FIM COBERTURA</label>
        <input type="date" name="FIM_${id}">
      </div>
    </div>`;
  }

  if (el.value === 'LICENCA MEDICA') {
    extra.innerHTML = `
    <div class="field-group">
      <label>NOME DO COLABORADOR</label>
      <input type="text" name="NOME_${id}">
    </div>
    <div class="field-group">
      <label>INÍCIO PREVISTO</label>
      <input type="date" name="INI_${id}" min="${dataMin}" value="${dataMin}" required>
    </div>`;
  }

  if (el.value === 'SUBSTITUICAO') {
    extra.innerHTML = `
    <div class="field-group">
      <label>NOME DO SUBSTITUÍDO</label>
      <input type="text" name="SUB_${id}">
    </div>
    <div class="field-group">
      <label>DATA INÍCIO</label>
      <input type="date" name="INI_${id}" min="${dataMin}" value="${dataMin}" required>
    </div>`;
  }
}

// inicia com 1 vaga
addVaga();

</script>

</body>
</html>
