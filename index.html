<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>FORMULÁRIO DE ABERTURA DE VAGA</title>

<style>
body {
  margin: 0;
  background: #f2f4f7;
  font-family: Arial;
  text-transform: uppercase;
}

.wrapper {
  max-width: 900px;
  margin: 40px auto;
  background: #fff;
  padding: 30px;
  border-radius: 6px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

h1 {
  font-size: 22px;
  border-bottom: 1px solid #ddd;
  padding-bottom: 10px;
}

.field-group { margin-bottom: 15px; }

.field-row {
  display: flex;
  gap: 10px;
}

.field-row > div { flex: 1; }

label {
  font-size: 13px;
  font-weight: bold;
}

input, select {
  width: 100%;
  padding: 8px;
  border: 1px solid #ccc;
  border-radius: 4px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  background: #005baa;
  color: white;
  border: none;
  cursor: pointer;
}

.hidden { display:none; }

@media (max-width:700px){
  .field-row { flex-direction:column; }
}
</style>
</head>

<body>
<div class="wrapper">

<form id="formVaga" action="https://formsubmit.co/mayara.dantas@grupobrasilforte.com.br" method="POST">

<h1>FORMULÁRIO DE ABERTURA DE VAGA</h1>

<div class="field-group">
<label>PROTOCOLO</label>
<input type="text" id="protocolo" name="PROTOCOLO" readonly>
</div>

<div class="field-group">
<label>SOLICITANTE</label>
<input type="text" name="SOLICITANTE" required>
</div>

<div class="field-group">
<label>E-MAIL</label>
<input type="email" id="emailSolicitante" name="EMAIL" required>
</div>

<div class="field-row">
<div>
<label>DATA ABERTURA</label>
<input type="date" id="dataAbertura" name="DATA ABERTURA">
</div>

<div>
<label>INÍCIO</label>
<input type="date" id="dataPrevisao" name="DATA INICIO">
</div>
</div>

<div class="field-group">
<label>QUANTIDADE</label>
<input type="number" id="qtd" min="1" required>
</div>

<div id="containerVagas"></div>

<button type="button" onclick="adicionarVaga()">+ ADICIONAR VAGA</button>

<div class="field-group">
<label>EMPRESA</label>
<select name="EMPRESA" required>
<option value="">SELECIONE</option>
<option>AKVA MONITORAMENTO</option>
<option>HEFESTOR</option>
<option>ATRIA</option>
<option>BRASIL FORTE</option>
</select>
</div>

<input type="hidden" name="_cc" value="allan.borges@grupobrasilforte.com.br">
<input type="hidden" name="_captcha" value="false">

<button type="button" id="btnPrevia">GERAR PRÉVIA</button>
<button type="submit" id="btnEnviar" class="hidden">ENVIAR</button>

</form>
</div>

<script>

/* PROTOCOLO */
(function(){
  const hoje = new Date();
  const f = d => d.toISOString().split('T')[0];

  document.getElementById('dataAbertura').value = f(hoje);
  document.getElementById('protocolo').value =
    "AV-" + f(hoje).replaceAll('-','') + "-" + Date.now().toString().slice(-4);
})();

/* MULTI VAGAS */
let contador = 0;

function adicionarVaga(){
  contador++;

  const div = document.createElement('div');

  div.innerHTML = `
    <h3>VAGA ${contador}</h3>

    <div class="field-group">
      <label>POSTO</label>
      <input name="POSTO[]" required>
    </div>

    <div class="field-group">
      <label>CARGO</label>
      <input name="CARGO[]" required>
    </div>

    <div class="field-row">
      <div>
        <label>ESCALA</label>
        <select name="ESCALA[]">
          <option>12X36</option>
          <option>5X2</option>
        </select>
      </div>

      <div>
        <label>ENTRADA</label>
        <input type="time" name="ENTRADA[]">
      </div>

      <div>
        <label>SAÍDA</label>
        <input type="time" name="SAIDA[]">
      </div>
    </div>

    <div class="field-group">
      <label>TIPO</label>
      <select name="TIPO[]">
        <option>AUMENTO</option>
        <option>SUBSTITUIÇÃO</option>
      </select>
    </div>

    <div class="field-group">
      <label>MOTIVO</label>
      <input name="MOTIVO[]">
    </div>

    <hr>
  `;

  document.getElementById('containerVagas').appendChild(div);
}

/* PRÉVIA */
const form = document.getElementById('formVaga');

document.getElementById('btnPrevia').onclick = () => {

  if (!form.checkValidity()) {
    form.reportValidity();
    return;
  }

  const data = new FormData(form);
  let html = "";

  for (let [k,v] of data.entries()){
    if(v) html += `<tr><td>${k}</td><td>${v}</td></tr>`;
  }

  const w = window.open("");

  w.document.write(`
    <table border="1" style="width:100%">
    ${html}
    </table>
  `);

  document.getElementById('btnEnviar').classList.remove('hidden');
  document.getElementById('btnPrevia').classList.add('hidden');
};

/* ENVIO */
form.addEventListener('submit', () => {

  const email = document.getElementById('emailSolicitante').value;
  const cc = document.querySelector('input[name="_cc"]');

  if (!cc.value.includes(email)){
    cc.value += "," + email;
  }

});

</script>
</body>
</html>
