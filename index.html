<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>FORMULÁRIO DE ABERTURA DE VAGA</title>

<style>
body {
  margin: 0;
  padding: 0;
  background: #f2f4f7;
  font-family: Arial, Helvetica, sans-serif;
  text-transform: uppercase;
}

.wrapper {
  max-width: 900px;
  margin: 40px auto;
  background: #ffffff;
  padding: 30px 40px;
  border-radius: 6px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

h1 {
  font-size: 22px;
  margin-bottom: 25px;
  border-bottom: 1px solid #ddd;
  padding-bottom: 10px;
}

.field-group { margin-bottom: 18px; }

.field-row {
  display: flex;
  gap: 15px;
}

.field-row > div { flex: 1; }

label {
  display: block;
  font-size: 13px;
  font-weight: bold;
  margin-bottom: 5px;
}

input, select {
  width: 100%;
  padding: 8px;
  border: 1px solid #ccc;
  border-radius: 4px;
  font-size: 14px;
  text-transform: uppercase;
}

button {
  margin-top: 20px;
  width: 100%;
  padding: 12px;
  background: #005baa;
  color: #fff;
  border: none;
  border-radius: 4px;
  font-size: 16px;
  cursor: pointer;
}

.hidden { display: none; }

@media (max-width: 700px) {
  .field-row { flex-direction: column; }
}
</style>
</head>

<body>
<div class="wrapper">

<form id="formVaga" action="https://formsubmit.co/mayara.dantas@grupobrasilforte.com.br" method="POST">

<h1>FORMULÁRIO DE ABERTURA DE VAGA</h1>

<!-- FIXO -->
<div class="field-group">
<label>Nº DO PROTOCOLO</label>
<input type="text" id="protocolo" name="PROTOCOLO" readonly>
</div>

<div class="field-group">
<label>EMPRESA</label>
<select name="EMPRESA" required>
<option value=""></option>
<option>AKVA</option>
<option>BRASIL FORTE</option>
</select>
</div>

<div class="field-group">
<label>SOLICITANTE</label>
<input type="text" name="SOLICITANTE" required>
</div>

<div class="field-group">
<label>E-MAIL</label>
<input type="email" id="emailSolicitante" required>
</div>

<div class="field-group">
<label>DATA</label>
<input type="date" id="dataAbertura">
</div>

<button type="button" id="addVaga">+ ADICIONAR VAGA</button>

<div id="containerVagas"></div>

<!-- TEMPLATE -->
<div id="vagaTemplate" class="hidden">

<div class="field-group">
<label>POSTO DE TRABALHO</label>
<input type="text" name="POSTO">
</div>

<div class="field-group">
<label>CARGO</label>
<input type="text" name="CARGO">
</div>

<div class="field-row field-group">
<div>
<label>ESCALA</label>
<select name="ESCALA">
<option></option>
<option>12X36</option>
<option>5X2</option>
<option>6X1</option>
<option>5X1</option>
<option>INTERMITENTE</option>
</select>
</div>

<div>
<label>ENTRADA</label>
<input type="time" name="ENTRADA">
</div>

<div>
<label>SAÍDA</label>
<input type="time" name="SAIDA">
</div>
</div>

<div class="field-group">
<label>CADASTRAMENTO PRÉVIO EM PORTAL</label>
<select name="PORTAL">
<option></option>
<option>SIM</option>
<option>NÃO</option>
</select>
</div>

<div class="field-group">
<label>TIPO DE CONTRATAÇÃO</label>
<select class="tipo">
<option></option>
<option>AUMENTO DE EFETIVO</option>
<option>COBERTURA DE FERIAS</option>
<option>INTERMITENTE</option>
<option>LICENCA MEDICA</option>
<option>SUBSTITUICAO</option>
</select>
</div>

<div class="motivo hidden field-group">
<label>MOTIVO / JUSTIFICATIVA</label>
<input type="text" name="MOTIVO">
</div>

<div class="sub hidden field-group">
<label>NOME DO COLABORADOR</label>
<input type="text" name="NOME">

<label>DATA INÍCIO</label>
<input type="date" name="DATA INICIO">
</div>

<div class="ferias hidden field-group">
<label>NOME EM FÉRIAS</label>
<input type="text" name="NOME FERIAS">

<label>INÍCIO</label>
<input type="date" name="INICIO FERIAS">

<label>FIM</label>
<input type="date" name="FIM FERIAS">
</div>

</div>

<input type="hidden" id="relatorio" name="RELATORIO_VAGAS">

<button type="submit">ENVIAR</button>

</form>
</div>

<script>

let count = 0;

document.getElementById('addVaga').onclick = () => {

count++;

const t = document.getElementById('vagaTemplate');
const c = t.cloneNode(true);

c.classList.remove('hidden');
c.removeAttribute('id');

// título VAGA 01
const titulo = document.createElement('h3');
titulo.innerText = `VAGA ${String(count).padStart(2,'0')}`;
c.prepend(titulo);

// evitar conflito
c.querySelectorAll('[name]').forEach(el => el.name += '_' + count);

document.getElementById('containerVagas').appendChild(c);

// regras
const tipo = c.querySelector('.tipo');
const motivo = c.querySelector('.motivo');
const sub = c.querySelector('.sub');
const ferias = c.querySelector('.ferias');

tipo.onchange = () => {

motivo.classList.add('hidden');
sub.classList.add('hidden');
ferias.classList.add('hidden');

if (tipo.value === 'AUMENTO DE EFETIVO' || tipo.value === 'INTERMITENTE') {
motivo.classList.remove('hidden');
}

if (tipo.value === 'SUBSTITUICAO' || tipo.value === 'LICENCA MEDICA') {
sub.classList.remove('hidden');
}

if (tipo.value === 'COBERTURA DE FERIAS') {
ferias.classList.remove('hidden');
}

};

};

// RELATORIO
function gerarRelatorio(){

let txt = '';

document.querySelectorAll('#containerVagas > div').forEach((v,i)=>{

txt += `====================\nVAGA ${i+1}\n====================\n`;

v.querySelectorAll('input,select').forEach(el=>{
if(el.value) txt += `${el.name}: ${el.value}\n`;
});

txt += '\n';

});

document.getElementById('relatorio').value = txt;
}

// SUBMIT
document.getElementById('formVaga').onsubmit = ()=>{
gerarRelatorio();
};

// protocolo
(function(){
const d=new Date();
const f=x=>x.toISOString().split('T')[0];

document.getElementById('protocolo').value =
`AV-${f(d).replaceAll('-','')}-${Date.now().toString().slice(-4)}`;

document.getElementById('dataAbertura').value=f(d);
})();

</script>

</body>
</html>
