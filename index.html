<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>FORMULÁRIO DE ABERTURA DE VAGA</title>

<style>
body { background:#f2f4f7; font-family:Arial; text-transform:uppercase; }
.wrapper { max-width:900px; margin:auto; background:#fff; padding:30px; }
.field { margin-bottom:15px; }
.vaga { border-top:2px solid #ddd; margin-top:20px; padding-top:20px; }
.hidden { display:none; }
button { padding:10px; margin-top:10px; cursor:pointer; }
</style>
</head>

<body>
<div class="wrapper">

<h2>ABERTURA DE VAGAS</h2>

<form id="formVaga">

<!-- BLOCO FIXO -->
<div class="field">
<label>PROTOCOLO</label>
<input type="text" id="protocolo" readonly>
</div>

<div class="field">
<label>EMPRESA</label>
<select required>
<option></option>
<option>AKVA</option>
<option>BRASIL FORTE</option>
</select>
</div>

<div class="field">
<label>SOLICITANTE</label>
<input type="text" required>
</div>

<div class="field">
<label>E-MAIL</label>
<input type="email" required>
</div>

<div class="field">
<label>DATA</label>
<input type="date" id="dataAbertura">
</div>

<!-- BOTÃO -->
<button type="button" onclick="addVaga()">+ ADICIONAR VAGA</button>

<!-- CONTAINER -->
<div id="vagas"></div>

<!-- ENVIO -->
<button type="submit">ENVIAR</button>

</form>
</div>

<script>

let count = 0;

function addVaga() {

  count++;

  const container = document.getElementById('vagas');

  const div = document.createElement('div');
  div.classList.add('vaga');

  div.innerHTML = `

<h3>VAGA ${count}</h3>

<label>POSTO</label>
<input type="text">

<label>CARGO</label>
<input type="text">

<label>ESCALA</label>
<select id="escala_${count}">
<option></option>
<option>12X36</option>
<option>5X2</option>
</select>

<label>ENTRADA</label>
<input type="time" id="entrada_${count}">

<label>SAÍDA</label>
<input type="time" id="saida_${count}">

<label>PORTAL</label>
<input type="checkbox" id="sim_${count}"> SIM
<input type="checkbox" id="nao_${count}"> NÃO

<label>TIPO</label>
<select onchange="tipo(this,${count})">
<option></option>
<option>AUMENTO DE EFETIVO</option>
<option>COBERTURA DE FERIAS</option>
<option>LICENCA MEDICA</option>
<option>SUBSTITUICAO</option>
</select>

<div id="motivo_${count}" class="hidden">
<label>MOTIVO</label>
<input type="text">
</div>

<div id="sub_${count}" class="hidden">
<label>NOME SUBSTITUÍDO</label>
<input type="text">
</div>

<div id="ferias_${count}" class="hidden">
<label>INÍCIO</label>
<input type="date">
<label>FIM</label>
<input type="date">
</div>

`;

  container.appendChild(div);

  eventos(count);
}

// REGRAS TIPO
function tipo(el, i) {

  const sub = document.getElementById(`sub_${i}`);
  const ferias = document.getElementById(`ferias_${i}`);
  const motivo = document.getElementById(`motivo_${i}`);

  sub.classList.add('hidden');
  ferias.classList.add('hidden');
  motivo.classList.add('hidden');

  if (el.value === "COBERTURA DE FERIAS") {
    sub.classList.remove('hidden');
    ferias.classList.remove('hidden');
  }

  else if (el.value === "SUBSTITUICAO" || el.value === "LICENCA MEDICA") {
    sub.classList.remove('hidden');
  }

  else {
    motivo.classList.remove('hidden');
  }
}

// EVENTOS POR VAGA
function eventos(i) {

  const sim = document.getElementById(`sim_${i}`);
  const nao = document.getElementById(`nao_${i}`);

  sim.onchange = () => { if(sim.checked) nao.checked=false; };
  nao.onchange = () => { if(nao.checked) sim.checked=false; };

  const entrada = document.getElementById(`entrada_${i}`);
  const saida = document.getElementById(`saida_${i}`);
  const escala = document.getElementById(`escala_${i}`);

  saida.addEventListener('change', () => {

    if (!entrada.value || !saida.value) return;

    const toMin = t => {
      const [h,m]=t.split(':').map(Number);
      return h*60+m;
    };

    let ini = toMin(entrada.value);
    let fim = toMin(saida.value);

    if (fim <= ini) fim += 1440;

    if (escala.value==="12X36" && (fim-ini)<660) {
      alert("ESCALA 12X36 ≈ 12H");
      saida.value="";
    }
  });
}

// PROTOCOLO
(function () {
  const hoje = new Date();
  const f = d => d.toISOString().split('T')[0];

  document.getElementById('protocolo').value =
    `AV-${f(hoje).replaceAll('-','')}-${Date.now().toString().slice(-4)}`;

  document.getElementById('dataAbertura').value = f(hoje);
})();

</script>

</body>
</html>
