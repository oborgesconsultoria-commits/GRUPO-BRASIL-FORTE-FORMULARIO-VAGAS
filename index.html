<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>FORMULÁRIO DE ABERTURA DE VAGA</title>

<style>
body {
  margin: 0;
  padding: 0;
  background: #f2f4f7;
  font-family: Arial, Helvetica, sans-serif;
  text-transform: uppercase;
}

.wrapper {
  max-width: 900px;
  margin: 40px auto;
  background: #ffffff;
  padding: 30px 40px;
  border-radius: 6px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

h1 {
  font-size: 22px;
  margin-bottom: 25px;
  border-bottom: 1px solid #ddd;
  padding-bottom: 10px;
}

.field-group { margin-bottom: 18px; }

label {
  display: block;
  font-size: 13px;
  font-weight: bold;
  margin-bottom: 5px;
}

input, select {
  width: 100%;
  padding: 8px;
  border: 1px solid #ccc;
  border-radius: 4px;
}

button {
  margin-top: 20px;
  width: 100%;
  padding: 12px;
  background: #005baa;
  color: #fff;
  border: none;
  border-radius: 4px;
  cursor: pointer;
}

.hidden { display: none; }

.logo {
  text-align: center;
  margin-bottom: 20px;
}
</style>
</head>

<body>
<div class="wrapper">

<div class="logo">
  <img src="assets/logoGBF.png" style="max-width:250px;">
</div>

<form id="formVaga"
action="https://formsubmit.co/mayara.dantas@grupobrasilforte.com.br"
method="POST">

<h1>FORMULÁRIO DE ABERTURA DE VAGA</h1>

<input type="hidden" name="_cc" value="allan.borges@grupobrasilforte.com.br,maria.fernanda@grupobrasilforte.com.br">
<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_template" value="table">
<input type="hidden" name="_subject" id="assuntoEmail">

<div class="field-group">
<label>PROTOCOLO</label>
<input type="text" id="protocolo" name="PROTOCOLO" readonly>
</div>

<div class="field-group">
<label>SOLICITANTE</label>
<input type="text" name="SOLICITANTE" required>
</div>

<div class="field-group">
<label>E-MAIL</label>
<input type="email" id="emailSolicitante" name="EMAIL" required>
</div>

<div class="field-group">
<label>DATA ABERTURA</label>
<input type="date" id="dataAbertura" name="DATA" readonly>
</div>

<div class="field-group">
<label>QUANTIDADE DE VAGAS</label>
<input type="number" id="qtd" min="1" required>
</div>

<div id="containerVagas"></div>

<button type="button" onclick="preview()">GERAR PRÉVIA</button>
<button type="submit">ENVIAR</button>

</form>
</div>

<script>

// DATA + PROTOCOLO
(function () {
  const hoje = new Date();
  const f = d => d.toISOString().split('T')[0];

  document.getElementById('dataAbertura').value = f(hoje);
  document.getElementById('protocolo').value =
    `AV-${f(hoje).replaceAll('-','')}-${Math.floor(Math.random()*10000)}`;

  document.getElementById('assuntoEmail').value = "ABERTURA DE VAGA";
})();

// GERAR VAGAS
const qtd = document.getElementById('qtd');
const container = document.getElementById('containerVagas');

qtd.addEventListener('input', () => {

  const n = parseInt(qtd.value) || 0;
  container.innerHTML = "";

  const min = new Date();
  min.setDate(min.getDate() + 5);
  const minDate = min.toISOString().split('T')[0];

  for (let i = 1; i <= n; i++) {

    const div = document.createElement('div');
    div.classList.add('field-group');

    div.innerHTML = `
      <hr><h3>VAGA ${i}</h3>

      <label>DATA INÍCIO</label>
      <input type="date" name="DATA_${i}" min="${minDate}" required>

      <label>POSTO</label>
      <input type="text" name="POSTO_${i}" required>

      <label>CARGO</label>
      <input type="text" name="CARGO_${i}" required>

      <label>ESCALA</label>
      <select name="ESCALA_${i}" required>
        <option></option>
        <option>12X36</option>
        <option>5X2</option>
      </select>

      <label>ENTRADA</label>
      <input type="time" name="ENTRADA_${i}" required>

      <label>SAÍDA</label>
      <input type="time" name="SAIDA_${i}" required>

      <label>PORTAL</label>
      <select name="PORTAL_${i}" required>
        <option></option>
        <option>SIM</option>
        <option>NÃO</option>
      </select>

      <label>TIPO</label>
      <select onchange="tipo(this,${i})" name="TIPO_${i}" required>
        <option></option>
        <option>AUMENTO</option>
        <option>FERIAS</option>
        <option>SUBSTITUICAO</option>
      </select>

      <div id="extra_${i}" class="hidden">
        <label>NOME SUB</label>
        <input type="text" name="SUB_${i}">
      </div>
    `;

    container.appendChild(div);
  }

});

function tipo(el, i) {
  const extra = document.getElementById(`extra_${i}`);
  extra.classList.add('hidden');

  if (el.value !== "AUMENTO") {
    extra.classList.remove('hidden');
  }
}

// PRÉVIA
function preview() {
  const form = document.getElementById('formVaga');
  const data = new FormData(form);

  let txt = "";

  for (let [k,v] of data.entries()) {
    if (!k.startsWith("_") && v) {
      txt += k + ": " + v + "\n";
    }
  }

  alert(txt);
}

</script>

</body>
</html>
