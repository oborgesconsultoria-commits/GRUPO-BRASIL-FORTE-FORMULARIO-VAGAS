<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>FORMULÁRIO DE ABERTURA DE VAGA</title>

<style>
body { font-family: Arial; background:#f2f4f7; }
.wrapper { max-width:900px; margin:auto; background:#fff; padding:30px; }
.field-group { margin-bottom:15px; }
.hidden { display:none; }
</style>
</head>

<body>
<div class="wrapper">

<h2>FORMULÁRIO DE VAGAS</h2>

<form id="formVaga">

<label>QUANTIDADE DE VAGAS</label>
<input type="number" id="qtd" min="1" required>

<div id="containerVagas"></div>

<button type="submit">ENVIAR</button>

</form>
</div>

<script>

const qtd = document.getElementById('qtd');
const container = document.getElementById('containerVagas');

qtd.addEventListener('input', gerarVagas);

function gerarVagas() {

  container.innerHTML = "";
  const n = parseInt(qtd.value) || 0;

  for (let i = 1; i <= n; i++) {

    const div = document.createElement('div');
    div.classList.add('field-group');

    div.innerHTML = `
    <hr><h3>VAGA ${i}</h3>

    <label>ESCALA</label>
    <select id="escala_${i}">
      <option></option>
      <option>12X36</option>
      <option>5X2</option>
      <option>6X1</option>
      <option>5X1</option>
      <option>INTERMITENTE</option>
    </select>

    <label>ENTRADA</label>
    <input type="time" id="entrada_${i}">

    <label>SAÍDA</label>
    <input type="time" id="saida_${i}">

    <label>PORTAL</label>
    <input type="checkbox" id="sim_${i}"> SIM
    <input type="checkbox" id="nao_${i}"> NÃO

    <label>TIPO</label>
    <select onchange="tipo(this,${i})">
      <option></option>
      <option>AUMENTO DE EFETIVO</option>
      <option>COBERTURA DE FERIAS</option>
      <option>LICENCA MEDICA</option>
      <option>SUBSTITUICAO</option>
    </select>

    <div id="motivo_${i}" class="hidden">
      <label>MOTIVO</label>
      <input type="text">
    </div>

    <div id="sub_${i}" class="hidden">
      <label>NOME SUBSTITUÍDO</label>
      <input type="text">

      <label>MATRÍCULA</label>
      <input type="text">
    </div>

    <div id="ferias_${i}" class="hidden">
      <label>DATA INÍCIO</label>
      <input type="date">

      <label>DATA FIM</label>
      <input type="date">
    </div>
    `;

    container.appendChild(div);

    aplicarEventos(i);
  }
}

// REGRAS DINÂMICAS
function tipo(el, i) {

  const sub = document.getElementById(`sub_${i}`);
  const ferias = document.getElementById(`ferias_${i}`);
  const motivo = document.getElementById(`motivo_${i}`);

  sub.classList.add('hidden');
  ferias.classList.add('hidden');
  motivo.classList.add('hidden');

  if (el.value === "COBERTURA DE FERIAS") {
    sub.classList.remove('hidden');
    ferias.classList.remove('hidden');
  }

  else if (el.value === "SUBSTITUICAO" || el.value === "LICENCA MEDICA") {
    sub.classList.remove('hidden');
  }

  else if (el.value === "AUMENTO DE EFETIVO") {
    motivo.classList.remove('hidden');
  }
}

// EVENTOS ESPECÍFICOS
function aplicarEventos(i) {

  const sim = document.getElementById(`sim_${i}`);
  const nao = document.getElementById(`nao_${i}`);

  sim.addEventListener('change', () => {
    if (sim.checked) nao.checked = false;
  });

  nao.addEventListener('change', () => {
    if (nao.checked) sim.checked = false;
  });

  const entrada = document.getElementById(`entrada_${i}`);
  const saida = document.getElementById(`saida_${i}`);
  const escala = document.getElementById(`escala_${i}`);

  saida.addEventListener('change', () => {

    if (!entrada.value || !saida.value) return;

    const toMin = t => {
      const [h,m] = t.split(':').map(Number);
      return h*60+m;
    };

    let ini = toMin(entrada.value);
    let fim = toMin(saida.value);

    if (fim <= ini) fim += 1440;

    if (escala.value === "12X36" && (fim - ini) < 660) {
      alert("ESCALA 12X36 PRECISA ~12H");
      saida.value = "";
    }

  });

}

</script>

</body>
</html>
