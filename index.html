<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>FORMULÁRIO DE ABERTURA DE VAGA</title>

<style>
body {
  margin: 0;
  padding: 0;
  background: #f2f4f7;
  font-family: Arial, Helvetica, sans-serif;
  text-transform: uppercase;
}

.wrapper {
  max-width: 900px;
  margin: 40px auto;
  background: #ffffff;
  padding: 30px 40px;
  border-radius: 6px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

h1 {
  font-size: 22px;
  margin-bottom: 25px;
  border-bottom: 1px solid #ddd;
  padding-bottom: 10px;
}

.field-group { margin-bottom: 18px; }

.field-row {
  display: flex;
  gap: 15px;
}

.field-row > div { flex: 1; }

label {
  display: block;
  font-size: 13px;
  font-weight: bold;
  margin-bottom: 5px;
}

input, select {
  width: 100%;
  padding: 8px;
  border: 1px solid #ccc;
  border-radius: 4px;
  font-size: 14px;
  text-transform: uppercase;
}

.options label {
  font-weight: normal;
  display: block;
  margin-bottom: 6px;
}

button {
  margin-top: 20px;
  width: 100%;
  padding: 12px;
  background: #005baa;
  color: #fff;
  border: none;
  border-radius: 4px;
  font-size: 16px;
  cursor: pointer;
}

.hidden { display: none; }

@media (max-width: 700px) {
  .field-row { flex-direction: column; }
}

.logo {
  text-align: center;
  margin-bottom: 20px;
}

.logo img {
  max-width: 260px;
  width: 100%;
}
</style>
</head>

<body>
<div class="wrapper">

<div class="logo">
  <img src="assets/logoGBF.png">
</div>

<form id="formVaga"
action="https://formsubmit.co/mayara.dantas@grupobrasilforte.com.br"
method="POST">

<h1>FORMULÁRIO DE ABERTURA DE VAGA</h1>

<!-- FIXO -->
<div class="field-group">
<label>Nº DO PROTOCOLO</label>
<input type="text" id="protocolo" name="PROTOCOLO" readonly>
</div>

<div class="field-group">
<label>EMPRESA</label>
<select name="EMPRESA" required>
<option value=""></option>
<option>AKVA</option>
<option>BRASIL FORTE</option>
</select>
</div>

<div class="field-group">
<label>SOLICITANTE</label>
<input type="text" name="SOLICITANTE" required>
</div>

<div class="field-group">
<label>E-MAIL</label>
<input type="email" id="emailSolicitante" required>
</div>

<div class="field-group">
<label>DATA</label>
<input type="date" id="dataAbertura">
</div>

<!-- BOTÃO -->
<button type="button" id="addVaga">+ ADICIONAR VAGA</button>

<!-- CONTAINER -->
<div id="containerVagas"></div>

<!-- TEMPLATE (SEU BLOCO) -->
<div id="vagaTemplate" class="hidden">

<div class="field-group">
<label>POSTO DE TRABALHO</label>
<input type="text" name="POSTO DE TRABALHO">
</div>

<div class="field-group">
<label>CARGO</label>
<input type="text" name="CARGO">
</div>

<div class="field-row field-group">
<div>
<label>ESCALA</label>
<select name="ESCALA" id="escala">
<option></option>
<option>12X36</option>
<option>5X2</option>
</select>
</div>
<div>
<label>ENTRADA</label>
<input type="time" id="horaEntrada">
</div>
<div>
<label>SAÍDA</label>
<input type="time" id="horaSaida">
</div>
</div>

<div class="field-group">
<label>PORTAL</label>
<label><input type="checkbox" id="portalSim"> SIM</label>
<label><input type="checkbox" id="portalNao"> NÃO</label>
</div>

<div class="field-group">
<label>TIPO</label>
<label><input type="radio" name="TIPO DE CONTRATAÇÃO" value="AUMENTO DE EFETIVO"> AUMENTO</label>
<label><input type="radio" name="TIPO DE CONTRATAÇÃO" value="COBERTURA DE FERIAS"> FÉRIAS</label>
<label><input type="radio" name="TIPO DE CONTRATAÇÃO" value="SUBSTITUICAO"> SUBSTITUIÇÃO</label>
</div>

<div class="hidden subnivel">
<input type="text" name="NOME COLABORADOR SUBSTITUIDO" placeholder="NOME">
</div>

<div class="hidden ferias">
<input type="date" name="DATA INICIO COBERTURA">
<input type="date" name="DATA FINAL COBERTURA">
</div>

</div>

<input type="hidden" id="relatorioVagas" name="RELATORIO_VAGAS">

<button type="submit">ENVIAR</button>

</form>
</div>

<script>

let i = 0;

document.getElementById('addVaga').onclick = () => {

i++;

const t = document.getElementById('vagaTemplate');
const c = t.cloneNode(true);

c.classList.remove('hidden');
c.removeAttribute('id');

c.querySelectorAll('[id]').forEach(el => el.id += '_'+i);
c.querySelectorAll('[name]').forEach(el => el.name += '_'+i);

document.getElementById('containerVagas').appendChild(c);

// regras
const radios = c.querySelectorAll('input[type="radio"]');
const sub = c.querySelector('.subnivel');
const ferias = c.querySelector('.ferias');

radios.forEach(r=>{
r.onchange = ()=>{
sub.classList.add('hidden');
ferias.classList.add('hidden');

if(r.value==='SUBSTITUICAO') sub.classList.remove('hidden');
if(r.value==='COBERTURA DE FERIAS'){
sub.classList.remove('hidden');
ferias.classList.remove('hidden');
}
};
});

};

// RELATORIO
function gerarRelatorio(){

let txt='';

document.querySelectorAll('#containerVagas > div').forEach((v,k)=>{

txt += `VAGA ${k+1}\n`;

v.querySelectorAll('input,select').forEach(el=>{
if(el.value) txt += `${el.name}: ${el.value}\n`;
});

txt += '\n';
});

document.getElementById('relatorioVagas').value = txt;
}

document.getElementById('formVaga').onsubmit = ()=>{
gerarRelatorio();
};

(function(){
const d=new Date();
const f=x=>x.toISOString().split('T')[0];

document.getElementById('protocolo').value =
`AV-${f(d).replaceAll('-','')}-${Date.now().toString().slice(-4)}`;

document.getElementById('dataAbertura').value=f(d);
})();

</script>

</body>
</html>
