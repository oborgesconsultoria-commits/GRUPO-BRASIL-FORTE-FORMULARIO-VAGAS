<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>FORMULÁRIO DE ABERTURA DE VAGA</title>

<style>
body {
  margin: 0;
  padding: 0;
  background: #f2f4f7;
  font-family: Arial;
  text-transform: uppercase;
}

.wrapper {
  max-width: 900px;
  margin: 40px auto;
  background: #fff;
  padding: 30px;
  border-radius: 6px;
}

h1 {
  font-size: 22px;
  margin-bottom: 20px;
}

.field-group { margin-bottom: 15px; }

.field-row {
  display: flex;
  gap: 10px;
}

.field-row > div { flex: 1; }

input, select {
  width: 100%;
  padding: 8px;
}

button {
  margin-top: 20px;
  width: 100%;
  padding: 12px;
  background: #005baa;
  color: #fff;
  border: none;
}

.hidden { display:none; }
</style>
</head>

<body>
<div class="wrapper">

<form id="formVaga"
action="https://formsubmit.co/mayara.dantas@grupobrasilforte.com.br"
method="POST"
enctype="multipart/form-data">

<h1>FORMULÁRIO DE ABERTURA DE VAGA</h1>

<!-- PROTOCOLO -->
<div class="field-group">
<label>PROTOCOLO</label>
<input type="text" id="protocolo" name="PROTOCOLO" readonly>
</div>

<!-- SOLICITANTE -->
<div class="field-group">
<label>SOLICITANTE</label>
<input type="text" name="SOLICITANTE" required>
</div>

<div class="field-group">
<label>E-MAIL</label>
<input type="email" id="emailSolicitante" name="EMAIL" required>
</div>

<div class="field-row field-group">
<div>
<label>DATA ABERTURA</label>
<input type="date" id="dataAbertura" name="DATA ABERTURA">
</div>
<div>
<label>DATA INÍCIO</label>
<input type="date" id="dataPrevisao" name="DATA INICIO">
</div>
</div>

<!-- VAGAS -->
<div class="field-group">
<label>QUANTIDADE DE VAGAS</label>
<input type="number" min="1" required>
</div>

<div id="containerVagas"></div>

<button type="button" onclick="adicionarVaga()">+ ADICIONAR VAGA</button>

<!-- EMPRESA -->
<div class="field-group">
<label>EMPRESA</label>
<div class="options">
    <label><input type="radio" name="EMPRESA" value="AKVA MONITORAMENTO" required> AKVA MONITORAMENTO</label>
    <label><input type="radio" name="EMPRESA" value="AKVA PROTECAO (HEFESTOR)"> AKVA PROTEÇÃO (HEFESTOR)</label>
    <label><input type="radio" name="EMPRESA" value="AKVA TECNOLOGIA"> AKVA TECNOLOGIA</label>
    <label><input type="radio" name="EMPRESA" value="ATRIA SERVICOS"> ATRIA SERVIÇOS</label>
    <label><input type="radio" name="EMPRESA" value="BRASIL FORTE"> BRASIL FORTE</label>
    <label><input type="radio" name="EMPRESA" value="VEGA SERVICOS"> VEGA SERVIÇOS</label>
  </div>
</div>

<input type="hidden" name="_cc" value="allan.borges@grupobrasilforte.com.br">
<input type="hidden" name="_captcha" value="false">

<button type="button" id="btnPrevia">GERAR PRÉVIA</button>
<button type="submit" id="btnEnviar" class="hidden">ENVIAR</button>

</form>
</div>

<script>

// PROTOCOLO + DATA
(function () {
  const hoje = new Date();
  const f = d => d.toISOString().split('T')[0];

  document.getElementById('protocolo').value =
    `AV-${f(hoje).replaceAll('-','')}-${Date.now().toString().slice(-4)}`;

  document.getElementById('dataAbertura').value = f(hoje);
})();

// ADICIONAR VAGA
let contador = 0;

function adicionarVaga() {
  contador++;

  const bloco = document.createElement('div');

  bloco.innerHTML = `
    <h3>VAGA ${contador}</h3>

    <input type="text" name="POSTO[]" placeholder="POSTO" required>
    <input type="text" name="CARGO[]" placeholder="CARGO" required>

    <select name="ESCALA[]" required>
      <option value="">ESCALA</option>
      <option>12X36</option>
      <option>5X2</option>
    </select>

    <input type="time" name="ENTRADA[]" required>
    <input type="time" name="SAIDA[]" required>

    <select name="PORTAL[]" required>
      <option value="">PORTAL?</option>
      <option>SIM</option>
      <option>NAO</option>
    </select>

    <select name="TIPO[]" required>
      <option value="">TIPO</option>
      <option>AUMENTO</option>
      <option>SUBSTITUIÇÃO</option>
    </select>

    <input type="text" name="MOTIVO[]" placeholder="MOTIVO">

    <input type="text" name="NOME_CANDIDATO[]" placeholder="CANDIDATO">
    <input type="text" name="TEL[]" placeholder="TELEFONE">

    <hr>
  `;

  document.getElementById('containerVagas').appendChild(bloco);
}

// PRÉVIA
document.getElementById('btnPrevia').addEventListener('click', function () {

  const form = document.getElementById('formVaga');

  if (!form.checkValidity()) {
    form.reportValidity();
    return;
  }

  const data = new FormData(form);
  let html = '';

  for (let [k,v] of data.entries()) {
    if (v) {
      html += `<tr><td><b>${k}</b></td><td>${v}</td></tr>`;
    }
  }

  const w = window.open('', '', 'width=800,height=600');

  w.document.write(`
    <table border="1" style="width:100%">
    ${html}
    </table>
  `);

  document.getElementById('btnEnviar').classList.remove('hidden');
  this.classList.add('hidden');
});

</script>

</body>
</html>
