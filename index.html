<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>FORMULÁRIO DE ABERTURA DE VAGA</title>

<style>
body {
  margin: 0;
  padding: 0;
  background: #f2f4f7;
  font-family: Arial, Helvetica, sans-serif;
  text-transform: uppercase;
}

.wrapper {
  max-width: 900px;
  margin: 40px auto;
  background: #ffffff;
  padding: 30px 40px;
  border-radius: 6px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

h1 {
  font-size: 22px;
  margin-bottom: 25px;
  border-bottom: 1px solid #ddd;
  padding-bottom: 10px;
}

.field-group { margin-bottom: 18px; }

.field-row {
  display: flex;
  gap: 15px;
}

.field-row > div { flex: 1; }

label {
  display: block;
  font-size: 13px;
  font-weight: bold;
  margin-bottom: 5px;
}

input, select {
  width: 100%;
  padding: 8px;
  border: 1px solid #ccc;
  border-radius: 4px;
  font-size: 14px;
  text-transform: uppercase;
}

button {
  margin-top: 20px;
  width: 100%;
  padding: 12px;
  background: #005baa;
  color: #fff;
  border: none;
  border-radius: 4px;
  font-size: 16px;
  cursor: pointer;
}

.vaga-box {
  border-top: 2px dashed #ccc;
  margin-top: 30px;
  padding-top: 20px;
}

.logo {
  text-align: center;
  margin-bottom: 20px;
}
.logo img {
  max-width: 260px;
}
</style>
</head>

<body>
<div class="wrapper">

<div class="logo">
  <img src="assets/logoGBF.png" alt="Logo">
</div>

<h1>FORMULÁRIO DE ABERTURA DE VAGA</h1>

<form id="formVaga" action="https://formsubmit.co/mayara.dantas@grupobrasilforte.com.br" method="POST" enctype="multipart/form-data">

<!-- BLOCO FIXO -->
<div class="field-group">
<label>Nº DO PROTOCOLO</label>
<input type="text" id="protocolo" name="PROTOCOLO" readonly>
</div>

<div class="field-group">
<label>DATA DE ABERTURA</label>
<input type="date" id="dataAbertura" name="DATA_ABERTURA" readonly>
</div>

<div class="field-group">
<label>DISPONIBILIZAÇÃO DA VAGA NA EMPRESA</label>
<select name="EMPRESA" id="empresaSelect" required>
<option value="">SELECIONE</option>
<option>AKVA MONITORAMENTO</option>
<option>AKVA PROTECAO (HEFESTOR)</option>
<option>AKVA TECNOLOGIA</option>
<option>ATRIA SERVICOS</option>
<option>BRASIL FORTE</option>
<option>VEGA SERVICOS</option>
</select>
</div>

<div class="field-group">
<label>SOLICITANTE</label>
<input type="text" name="SOLICITANTE" required>
</div>

<div class="field-group">
<label>E-MAIL</label>
<input type="email" name="EMAIL" required>
</div>

<!-- VAGAS -->
<div id="vagasContainer"></div>

<button type="button" onclick="addVaga()">+ ADICIONAR VAGA</button>
<button type="button" onclick="removeVaga()">- REMOVER ÚLTIMA VAGA</button>

<button type="button" onclick="gerarPrevia()">GERAR PRÉVIA</button>

<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_subject" id="assuntoEmail">

<button type="submit">ENVIAR</button>

</form>
</div>

<script>

let vagaCount = 0;

/* =========================
   PROTOCOLO + DATA FIXA
========================= */
(function () {
  const hoje = new Date();
  const f = d => d.toISOString().split('T')[0];

  document.getElementById('dataAbertura').value = f(hoje);

  document.getElementById('protocolo').value =
    `AV-${f(hoje).replaceAll('-','')}-${Date.now().toString().slice(-4)}`;

  document.getElementById('assuntoEmail').value =
    `FORMULÁRIO DE ABERTURA DE VAGAS`;
})();

/* =========================
   ASSUNTO DINÂMICO
========================= */
document.getElementById("empresaSelect").addEventListener("change", function(){
  document.getElementById("assuntoEmail").value =
    `FORMULÁRIO DE ABERTURA DE VAGAS - ${this.value}`;
});

/* =========================
   MÁSCARA TELEFONE
========================= */
function mascaraTelefone(el) {
  let v = el.value.replace(/\D/g, '');
  if (v.length > 11) v = v.slice(0,11);

  if (v.length > 6) {
    el.value = `(${v.slice(0,2)}) ${v.slice(2,7)}-${v.slice(7)}`;
  } else if (v.length > 2) {
    el.value = `(${v.slice(0,2)}) ${v.slice(2)}`;
  } else {
    el.value = v;
  }
}

/* =========================
   ADICIONAR VAGA
========================= */
function addVaga() {
  vagaCount++;

  const hoje = new Date();
  const min = new Date();
  min.setDate(hoje.getDate() + 5);
  const minDate = min.toISOString().split('T')[0];

  const div = document.createElement("div");
  div.className = "vaga-box";

  div.innerHTML = `
  <h3>VAGA ${String(vagaCount).padStart(2,'0')}</h3>

  <div class="field-group">
    <label>DATA INÍCIO</label>
    <input type="date" name="INICIO_${vagaCount}" value="${minDate}" min="${minDate}" required>
  </div>

  <div class="field-group">
    <label>POSTO</label>
    <input type="text" name="POSTO_${vagaCount}" required>
  </div>

  <div class="field-group">
    <label>CARGO</label>
    <input type="text" name="CARGO_${vagaCount}" required>
  </div>

  <div class="field-group">
    <label>PORTAL</label>
    <select name="PORTAL_${vagaCount}" required>
      <option>SIM</option>
      <option>NÃO</option>
    </select>
  </div>

  <div class="field-group">
    <label>TIPO DE CONTRATAÇÃO</label>
    <select onchange="tipoChange(this, ${vagaCount})" name="TIPO_${vagaCount}" required>
      <option value="">SELECIONE</option>
      <option>AUMENTO DE EFETIVO</option>
      <option>COBERTURA DE FERIAS</option>
      <option>INTERMITENTE</option>
      <option>LICENCA MEDICA</option>
      <option>SUBSTITUICAO</option>
    </select>
  </div>

  <div id="extra_${vagaCount}"></div>

  <div class="field-group">
    <label>CURRÍCULO</label>
    <input type="file" name="CURRICULO_${vagaCount}">
  </div>

  <div class="field-group">
    <label>NOME CANDIDATO</label>
    <input type="text" name="CANDIDATO_${vagaCount}">
  </div>

  <div class="field-group">
    <label>TELEFONE</label>
    <input type="text" name="TEL_${vagaCount}" oninput="mascaraTelefone(this)">
  </div>

  <div class="field-group">
    <label>WHATSAPP</label>
    <select name="WPP_${vagaCount}">
      <option>SIM</option>
      <option>NÃO</option>
    </select>
  </div>
  `;

  document.getElementById("vagasContainer").appendChild(div);
}

/* =========================
   REMOVER VAGA
========================= */
function removeVaga() {
  if (vagaCount <= 1) return alert("MÍNIMO 1 VAGA");

  document.getElementById("vagasContainer").lastChild.remove();
  vagaCount--;
}

/* =========================
   DINÂMICA DE TIPO
========================= */
function tipoChange(el, id) {
  const div = document.getElementById("extra_" + id);
  div.innerHTML = "";

  const hoje = new Date();
  const min = new Date();
  min.setDate(hoje.getDate() + 5);
  const minDate = min.toISOString().split('T')[0];

  if (el.value === "AUMENTO DE EFETIVO") {
    div.innerHTML = `
      <div class="field-group">
        <label>QUANTIDADE</label>
        <input type="number" name="QTD_${id}">
      </div>
      <div class="field-group">
        <label>MOTIVO</label>
        <input type="text" name="MOTIVO_${id}">
      </div>`;
  }

  if (el.value === "COBERTURA DE FERIAS") {
    div.innerHTML = `
      <div class="field-group">
        <label>NOME SUBSTITUÍDO</label>
        <input type="text" name="NOME_${id}">
      </div>
      <div class="field-row field-group">
        <div>
          <label>INÍCIO</label>
          <input type="date" name="INI_${id}" value="${minDate}">
        </div>
        <div>
          <label>FIM</label>
          <input type="date" name="FIM_${id}">
        </div>
      </div>`;
  }

  if (el.value === "LICENCA MEDICA") {
    div.innerHTML = `
      <div class="field-group">
        <label>NOME</label>
        <input type="text" name="NOME_${id}">
      </div>
      <div class="field-group">
        <label>INÍCIO</label>
        <input type="date" name="INI_${id}" value="${minDate}">
      </div>`;
  }

  if (el.value === "INTERMITENTE") {
    div.innerHTML = `
      <div class="field-group">
        <label>MOTIVO</label>
        <input type="text" name="MOTIVO_${id}">
      </div>`;
  }

  if (el.value === "SUBSTITUICAO") {
    div.innerHTML = `
      <div class="field-group">
        <label>SUBSTITUÍDO</label>
        <input type="text" name="SUB_${id}">
      </div>`;
  }
}

/* =========================
   PRÉVIA
========================= */
function gerarPrevia() {
  const form = document.getElementById("formVaga");
  const data = new FormData(form);

  let rows = "";

  for (let [k,v] of data.entries()) {
    if (!v || v instanceof File) continue;

    rows += `
    <tr>
      <td style="border:1px solid #ccc;padding:6px;font-weight:bold;">${k}</td>
      <td style="border:1px solid #ccc;padding:6px;">${v}</td>
    </tr>`;
  }

  const win = window.open("", "", "width=900,height=700");

  win.document.write(`
  <html>
  <body style="font-family:Arial;padding:20px">
    <h2>PRÉVIA - FORMULÁRIO</h2>
    <table style="width:100%;border-collapse:collapse">
      ${rows}
    </table>
    <br>
    <button onclick="window.close()">FECHAR</button>
  </body>
  </html>
  `);

  win.document.close();
}

/* inicia */
addVaga();

</script>

</body>
</html>
